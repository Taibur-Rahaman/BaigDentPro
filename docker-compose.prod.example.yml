# Example: run the built image with your real server/.env (Postgres must be reachable from the container).
# cp docker-compose.prod.example.yml docker-compose.yml
# docker compose up -d --build
#
# First deploy / schema: docker compose run --rm web sh -c "cd server && npx prisma migrate deploy"

services:
  web:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - server/.env
    restart: unless-stopped
